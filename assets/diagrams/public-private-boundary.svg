<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780" role="img" aria-labelledby="title desc">
  <title id="title">Faith Team Ops public and private boundary</title>
  <desc id="desc">The public repository and WordPress page pass through review while private source, records, and infrastructure remain unpublished.</desc>
  <rect width="1600" height="780" fill="#f8f6ef"/>
  <text x="80" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#063f30">Public / Private Boundary</text>
  <text x="80" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#405047">What can be shown, what must be reviewed, and what stays private.</text>
  <defs>
    <style>
      .panel { rx: 18; stroke-width: 3; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .text { font-family: Segoe UI, Arial, sans-serif; font-size: 21px; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; }
      .white { fill: #fff; }
      .ink { fill: #10201b; }
      .muted { fill: #53625b; }
      .public { fill: #063f30; stroke: #063f30; }
      .review { fill: #ffffff; stroke: #c69232; }
      .private { fill: #101614; stroke: #101614; }
      .line { stroke: #0b665c; stroke-width: 5; fill: none; }
      .dash { stroke: #9a7b34; stroke-width: 5; stroke-dasharray: 12 12; fill: none; }
    </style>
  </defs>

  <rect class="panel public" x="80" y="190" width="410" height="440"/>
  <text class="title white" x="285" y="248" text-anchor="middle">Public Surface</text>
  <rect x="122" y="288" width="326" height="72" rx="10" fill="#ffffff" opacity="0.96"/>
  <text class="text ink" x="285" y="333" text-anchor="middle">GitHub docs + visuals</text>
  <rect x="122" y="390" width="326" height="72" rx="10" fill="#ffffff" opacity="0.96"/>
  <text class="text ink" x="285" y="435" text-anchor="middle">WordPress project page</text>
  <rect x="122" y="492" width="326" height="72" rx="10" fill="#ffffff" opacity="0.96"/>
  <text class="text ink" x="285" y="537" text-anchor="middle">Brief, roadmap, policies</text>

  <rect class="panel review" x="595" y="190" width="410" height="440"/>
  <text class="title ink" x="800" y="248" text-anchor="middle">Review Layer</text>
  <rect x="637" y="288" width="326" height="72" rx="10" fill="#fff8e8" stroke="#e5d3a0"/>
  <text class="text ink" x="800" y="333" text-anchor="middle">Faith review</text>
  <rect x="637" y="390" width="326" height="72" rx="10" fill="#fff8e8" stroke="#e5d3a0"/>
  <text class="text ink" x="800" y="435" text-anchor="middle">Privacy review</text>
  <rect x="637" y="492" width="326" height="72" rx="10" fill="#fff8e8" stroke="#e5d3a0"/>
  <text class="text ink" x="800" y="537" text-anchor="middle">Launch checklist</text>

  <rect class="panel private" x="1110" y="190" width="410" height="440"/>
  <text class="title white" x="1315" y="248" text-anchor="middle">Protected Systems</text>
  <rect x="1152" y="288" width="326" height="72" rx="10" fill="#ffffff" opacity="0.94"/>
  <text class="text ink" x="1315" y="333" text-anchor="middle">Plugin source + packages</text>
  <rect x="1152" y="390" width="326" height="72" rx="10" fill="#ffffff" opacity="0.94"/>
  <text class="text ink" x="1315" y="435" text-anchor="middle">Records + private media</text>
  <rect x="1152" y="492" width="326" height="72" rx="10" fill="#ffffff" opacity="0.94"/>
  <text class="text ink" x="1315" y="537" text-anchor="middle">Secrets, prompts, infra</text>

  <path class="line" d="M492 410 H593"/>
  <path class="dash" d="M1007 410 H1108"/>
  <text class="small muted" x="800" y="682" text-anchor="middle">Public materials explain the system. Review protects Faith's ownership. Private systems do not publish.</text>
</svg>
